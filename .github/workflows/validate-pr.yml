name: Validate and Deploy Lists

on:
  pull_request:
    branches: [main]
    paths:
      - 'Packs/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    name: Validate Changed Lists
    runs-on: ubuntu-latest

    outputs:
      changed_files: ${{ steps.changed.outputs.files }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Get changed files
        id: changed
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          CHANGED_FILES=$(git diff --name-only "origin/${BASE_REF}...HEAD" -- 'Packs/' \
            | tr '\n' ' ')
          echo "files=${CHANGED_FILES}" >> "$GITHUB_OUTPUT"
          echo "Changed files: ${CHANGED_FILES}"

      - name: Validate lists
        if: steps.changed.outputs.files != ''
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: python scripts/validate.py $CHANGED_FILES

  deploy:
    name: Upload Changed Lists
    needs: validate
    runs-on: ubuntu-latest
    if: success() && needs.validate.outputs.changed_files != ''

    steps:
      - name: Check required secrets
        env:
          HAS_DEMISTO_BASE_URL: ${{ secrets.DEMISTO_BASE_URL != '' }}
          HAS_DEMISTO_API_KEY: ${{ secrets.DEMISTO_API_KEY != '' }}
          HAS_XSIAM_AUTH_ID: ${{ secrets.XSIAM_AUTH_ID != '' }}
        run: |
          MISSING=""
          if [ "$HAS_DEMISTO_BASE_URL" != "true" ]; then MISSING="$MISSING DEMISTO_BASE_URL"; fi
          if [ "$HAS_DEMISTO_API_KEY" != "true" ]; then MISSING="$MISSING DEMISTO_API_KEY"; fi
          if [ "$HAS_XSIAM_AUTH_ID" != "true" ]; then MISSING="$MISSING XSIAM_AUTH_ID"; fi
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:$MISSING"
            exit 1
          fi
          echo "All required secrets are configured."

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Upload changed lists
        env:
          DEMISTO_BASE_URL: ${{ secrets.DEMISTO_BASE_URL }}
          DEMISTO_API_KEY: ${{ secrets.DEMISTO_API_KEY }}
          XSIAM_AUTH_ID: ${{ secrets.XSIAM_AUTH_ID }}
          CHANGED_FILES: ${{ needs.validate.outputs.changed_files }}
        run: python scripts/upload.py $CHANGED_FILES

  auto-merge:
    name: Auto-merge PR
    needs: [validate, deploy]
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Merge PR and delete branch
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              merge_method: 'squash'
            });
            await github.rest.git.deleteRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${pr.head.ref}`
            });
